apiVersion: v2
name: timeslice
description: Parent Helm chart to deploy both Accelerator Orchestrator and Snapshot Agent
type: application
version: 0.1.0
appVersion: "0.1.0"
dependencies:
  - name: acceleratororchestrator
    version: 0.1.0
    repository: "file://./acceleratororchestrator"
  - name: snapshot-agent
    version: 0.1.0
    repository: "file://./snapshot-agent"
  - name: nvidia-dra-driver-gpu
    version: 25.8.0
    repository: "https://helm.ngc.nvidia.com/nvidia"
    condition: nvidia-dra-driver-gpu.enabled

