replicaCount: 1

image:
  repository: ghcr.io/llm-d-incubation/llm-d-rl-time-slicing/acceleratororchestrator
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 50051

# Port the orchestrator uses to reach the snapshot agents on group nodes
# (hostNetwork). Must match the snapshot-agent chart's `port` value.
snapshotAgentPort: 9001

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

rbac:
  # Specifies whether RBAC resources should be created
  create: true
